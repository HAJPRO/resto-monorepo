<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="utf-8" />
    <title>Lattico</title>
    <base href="/" />

    <meta name="color-scheme" content="light dark" />
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="description" content="Lattico - Professional Boshqaruv Tizimi" />
    <meta name="theme-color" content="#4f46e5" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
    
    <link 
      rel="stylesheet" 
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" 
    />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Lattico" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>

  <body class="font-inter bg-slate-100 dark:bg-slate-900 text-slate-600 dark:text-slate-400 antialiased overflow-hidden">
    
    <script>
      (function() {
        // Dark Mode tekshiruvi
        const userTheme = localStorage.getItem('theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (userTheme === 'dark' || (!userTheme && systemDark)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }

        // Sidebar holati
        const sidebarExpanded = localStorage.getItem('sidebar-expanded');
        if (sidebarExpanded === 'true') {
          document.body.classList.add('sidebar-expanded');
        }
      })();
      
    </script>

    <div id="app">
     
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
